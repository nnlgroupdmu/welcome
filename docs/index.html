<!DOCTYPE html>
<html lang="cn">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 基础链接样式 */
    .sidebar-nav li a[href*="grafana"] {
        padding-right: 60px !important; 
        position: relative;
        display: block; /* 确保链接撑满整行，让定位更准 */
    }

    /* 标签样式优化 */
    .sidebar-nav li a[href*="grafana"]::after {
        color: #ffffff;
        content: "● LIVE";
        font-size: 9px;     /* 稍微调小一点，更精致 */
        font-weight: bold;
        
        display: inline-block;
        vertical-align: middle;
        /* 关键：通过左边距控制与标题的距离 */
        margin-left: 10px; 
        /* 关键：通过负的 margin 抵消对行高的影响 */
        margin-top: -2px;
        
        background-color: #fd9099;
        padding: 1px 4px;   /* 减小内边距 */
        border-radius: 4px;
        line-height: 1.2;   /* 锁定标签内部行高 */
        white-space: nowrap;
        /* ... 保持上面的代码不变 ... */
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }
  </style>
</head>
<body>
  
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '实验室服务器指南',
      repo: 'https://github.com/nnlgroupdmu/welcome',
      subMaxLevel: 3, // 抓取正文中的标题显示在侧边栏
      auto2top: true, // 切换页面后自动回到顶部
      loadSidebar: true,
      coverpage: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索指南内容...',
        noData: '找不到结果',
        depth: 6
      },
      flexibleAlerts: {
        style: 'flat' // 推荐使用 flat 或 callout 风格，看起来非常专业
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!--在所有的代码块上添加一个简单的Click to copy按钮来允许用户从你的文档中轻易地复制代码-->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- magic quote block -->
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
</body>
</html>
